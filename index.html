<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cryptodash</title>
  </head>
  <body>
    <header class="global-ticker" id="global-stats">
    <p>Loading global market data...</p>
    </header>
    <div class="currency-selector">
      <label for="currency">Currency:</label>
      <select id="currency-select">
        <option value="usd">USD (Dollar)</option>
        <option value="ars">ARS (Argentine Peso)</option>
      </select>
    </div>
    <main>
      <h1>Market Trends</h1>
      <section class="controls">
        <input type="text" id="search-input" placeholder="Search coins...">
        <select id="sort-select">
          <option value="market_cap_desc">Market Cap (High to Low)</option>
          <option value="market_cap_asc">Market Cap (Low to High)</option>
          <option value="price_desc">Price (High to Low)</option>
          <option value="price_asc">Price (Low to High)</option>
        </select>
      </section>
      <div id="crypto-list" class="crypto-container">
        <p>Cargando datos del mercado...</p>
      </div>
    </main>
    <div id="app"></div>
    <script type="module" src="/src/js/main.js"></script>
  </body>
  
  </html>
